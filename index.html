<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infopedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-left">
    <a href="#" class="logo" onclick="navigate('home')">
      <span class="logo-i">I</span>nfopedia
    </a>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Search articles…" autocomplete="off">
      <div id="search-results" class="search-dropdown hidden"></div>
    </div>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="navigate('home')">Browse</button>
    <div id="auth-area"></div>
  </div>
</nav>

<!-- MAIN -->
<div id="app"></div>

<!-- MODAL OVERLAY -->
<div id="modal-overlay" class="hidden" onclick="closeModal()"></div>
<div id="modal" class="hidden"></div>

<!-- TOAST -->
<div id="toast" class="hidden"></div>

<!-- Firebase -->
<script type="module" src="main.js"></script>
</body>
</html>
